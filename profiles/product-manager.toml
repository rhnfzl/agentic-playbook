# Profile: Product Manager (team)
name = "product-manager"
description = "Product manager working across team projects. Bundles 15 curated PM-execution skills (PRD, sprint planning, retro, roadmap, stakeholder mapping, prioritization) alongside 3 playbook-lifecycle skills (agents-md-curator, playbook-promote, playbook-retrospective) and 3 productivity helpers (handoff, stakeholder-slack-brief, grill-me): 21 skills total. Pairs with the research profile via --profile product-manager,research for PMs who also run discovery."
owner = "rehan"
last_reviewed = "2026-05-26"

# v0.11 (ADR-0040): this profile references overlay-only items
# (jira-priority-scheme, label-policy, atlassian MCP,
# productivity/stakeholder-slack-brief). Without requires_overlays an
# install with --scope none would silently drop them and produce a thin
# PM target. validate_profile_scope catches that.
requires_overlays = ["team"]

[skills]
include = [
  # PM execution skills (vendored from phuryn + product-on-purpose)
  "imported/create-prd",
  "imported/user-stories",
  "imported/sprint-plan",
  "imported/retro",
  "imported/pre-mortem",
  "imported/stakeholder-map",
  "imported/brainstorm-okrs",
  "imported/release-notes",
  "imported/summarize-meeting",
  "imported/job-stories",
  "imported/outcome-roadmap",
  "imported/prioritize-features",
  "imported/opportunity-solution-tree",
  "imported/utility-pm-critic",
  "imported/define-problem-statement",

  # Onboarding + lifecycle from the playbook
  "meta/agents-md-curator",
  "meta/playbook-promote",
  "meta/playbook-retrospective",

  # PM-relevant productivity
  "productivity/handoff",
  "productivity/stakeholder-slack-brief",
  "productivity/grill-me",
]

[rules]
include = [
  "writing-style",
  "no-em-dashes",
  "jira-priority-scheme",
  "label-policy",
  "no-ticket-ids-in-code",
]

[hooks]
include = [
  "human-html-advisory",
  "agent-memory-session-brief",
]

[mcp]
include = [
  "atlassian",
  "slack",
  "tavily",
]
