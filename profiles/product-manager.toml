# Profile: Product Manager (portable)
name = "product-manager"
description = "Product manager profile. Bundles 15 curated PM-execution skills (PRD, sprint planning, retro, roadmap, stakeholder mapping, prioritization) from the vendored pm-curated set, alongside playbook-lifecycle skills (agents-md-curator, playbook-promote, playbook-retrospective) and productivity helpers (handoff, grill-me)."
owner = "rehan"
last_reviewed = "2026-05-28"

[skills]
include = [
  # PM execution skills (vendored under imported/pm-curated/)
  "imported/pm-curated/create-prd",
  "imported/pm-curated/user-stories",
  "imported/pm-curated/sprint-plan",
  "imported/pm-curated/retro",
  "imported/pm-curated/pre-mortem",
  "imported/pm-curated/stakeholder-map",
  "imported/pm-curated/brainstorm-okrs",
  "imported/pm-curated/release-notes",
  "imported/pm-curated/summarize-meeting",
  "imported/pm-curated/job-stories",
  "imported/pm-curated/outcome-roadmap",
  "imported/pm-curated/prioritize-features",
  "imported/pm-curated/opportunity-solution-tree",
  "imported/pm-curated/utility-pm-critic",
  "imported/pm-curated/define-problem-statement",

  # Onboarding + lifecycle from the playbook
  "meta/agents-md-curator",
  "meta/playbook-promote",
  "meta/playbook-retrospective",

  # PM-relevant productivity
  "productivity/handoff",
  "productivity/grill-me",
]

[rules]
include = [
  "writing-style",
  "no-em-dashes",
  "no-ticket-ids-in-code",
]

[hooks]
include = [
  "human-html-advisory",
  "agent-memory-session-brief",
]

[mcp]
include = [
  "slack",
  "tavily",
]
