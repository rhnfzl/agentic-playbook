# Profile: Frontend Developer (portable, public-safe subset)
name = "frontend-developer"
description = "Frontend developer profile. Public-safe subset of the upstream frontend-developer bundle: code-review-graph-first, post-iter-review, productivity skills, and frontend-slides. Workplace-specific MCP bindings are designed in the upstream and intentionally not shipped here."
owner = "rehan"
last_reviewed = "2026-05-28"

[skills]
include = [
  "engineering/code-review-graph-first",
  "engineering/post-iter-review",
  "productivity/frontend-slides",
  "productivity/grill-me",
  "productivity/handoff",
  "meta/write-a-skill",
]

[rules]
include = [
  "no-em-dashes",
  "no-ticket-ids-in-code",
  "writing-style",
  "never-push-to-develop",
]

[hooks]
include = ["lint-guard", "never-push-to-develop", "human-html-autoindex"]

[mcp]
include = ["slack", "tavily"]
