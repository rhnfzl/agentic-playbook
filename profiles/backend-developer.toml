# Profile: Backend Developer (portable, public-safe subset)
name = "backend-developer"
description = "Backend developer profile. Public-safe subset of the upstream backend-developer bundle: the engineering, productivity, and meta skills that ship in this mirror, plus the always-on writing-style and no-em-dashes rules. Workplace-specific extensions (specific CI gates, ticket-tracker bindings, internal request-chain rules, internal-host policies, VCS-host bindings) are designed in the upstream and intentionally not shipped here."
owner = "rehan"
last_reviewed = "2026-05-28"

[skills]
include = [
  "engineering/ci-failure-triage",
  "engineering/post-iter-review",
  "engineering/improve-codebase-architecture",
  "engineering/tdd",
  "engineering/triage",
  "productivity/grill-me",
  "productivity/handoff",
  "meta/write-a-skill",
]

[rules]
include = [
  "no-em-dashes",
  "no-ticket-ids-in-code",
  "writing-style",
  "never-push-to-develop",
]

[hooks]
include = ["lint-guard", "never-push-to-develop", "human-html-autoindex"]

[mcp]
include = ["code-review-graph", "slack", "tavily"]
