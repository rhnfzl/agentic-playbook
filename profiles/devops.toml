# Profile: DevOps (portable, public-safe subset)
name = "devops"
description = "DevOps engineer profile. Public-safe subset: lifecycle meta skills, productivity helpers, and observability skills that ship in this mirror. The workplace-specific devops skills (secrets-manager configmap apply, error-tracking issue triage, k8s dashboard verification, CI pipeline debugging) are designed in the upstream and intentionally not shipped here."
owner = "rehan"
last_reviewed = "2026-05-28"

[skills]
include = [
  "observability/ha-alert-triage",
  "observability/market-audit-deployed-stack",
  "meta/agents-md-curator",
  "meta/playbook-promote",
  "meta/playbook-retrospective",
  "productivity/handoff",
]

[rules]
include = [
  "writing-style",
  "no-em-dashes",
  "no-ticket-ids-in-code",
  "never-push-to-develop",
]

[hooks]
include = [
  "never-push-to-develop",
  "agent-memory-session-brief",
]

[mcp]
include = [
  "slack",
]
