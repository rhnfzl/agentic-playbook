# Profile: QA
name = "qa"
description = "Quality Assurance engineer. Focused on chat transcript debugging, scenario triage, and CI failure triage. Light on architecture rules; heavy on debugging workflows."

[skills]
include = [
  "engineering/chat-transcript-debug",
  "engineering/agentic-scenario-triage",
  "engineering/ci-failure-triage",
  "engineering/match-ticket-grounding",
  "productivity/grill-me",
  "productivity/handoff",
  "productivity/stakeholder-slack-brief",
  "observability/k8s-state-sweep",
  "observability/vpn-connectivity-check",
]

[rules]
include = [
  "label-policy",
  "no-em-dashes",
  "no-ticket-ids-in-code",
  "VCS-not-github",
  "writing-style",
  "jira-priority-scheme",
  "full-request-chain",
  "direct-acc-first",
]

[hooks]
include = ["sonar-advisory", "human-html-autoindex"]

[mcp]
include = ["atlassian", "slack", "error-tracking", "tavily", "code-quality"]
