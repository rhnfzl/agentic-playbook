# Profile: Tech Lead (portable, public-safe subset)
name = "tech-lead"
description = "Tech lead profile with broad coverage. Public-safe subset of the upstream tech-lead bundle: all engineering, productivity, meta, and observability skills that ship in this mirror, plus always-on rules. Workplace-specific extensions (specific CI gates, internal request-chain rules, ticket-tracker bindings) are designed in the upstream and intentionally not shipped here."
owner = "rehan"
last_reviewed = "2026-05-28"

[skills]
include = [
  "engineering/ci-failure-triage",
  "engineering/code-review-graph-first",
  "engineering/diagnose",
  "engineering/improve-codebase-architecture",
  "engineering/post-iter-review",
  "engineering/prototype",
  "engineering/tdd",
  "engineering/to-issues",
  "engineering/to-prd",
  "engineering/triage",
  "productivity/grill-me",
  "productivity/handoff",
  "productivity/ask-colleague",
  "productivity/ask-team",
  "observability/ha-alert-triage",
  "observability/market-audit-deployed-stack",
  "meta/agents-md-curator",
  "meta/audit-docs",
  "meta/playbook-promote",
  "meta/playbook-retrospective",
  "meta/skill-cleaner",
  "meta/write-a-skill",
  "meta/zoom-out",
]

[rules]
include = [
  "no-em-dashes",
  "no-ticket-ids-in-code",
  "writing-style",
  "never-push-to-develop",
]

[hooks]
include = ["lint-guard", "never-push-to-develop", "human-html-autoindex", "agent-memory-session-brief"]

[mcp]
include = ["code-review-graph", "slack", "tavily"]
