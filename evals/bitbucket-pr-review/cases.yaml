# Eval cases for skills/engineering/VCS-pr-review/SKILL.md
# v0.3 mode: static assertions. Each case validates the skill body still
# covers the expected review surface. Future v0.4 mode will dynamic-eval
# against fixture PRs.

cases:
  - name: covers trigger surface
    skill: overlays/team/skills/engineering/VCS-pr-review/SKILL.md
    assertions:
      - type: section_present
        pattern: (when|steps|use)
      - type: section_present
        pattern: when not to use

  - name: enforces em-dash rule
    skill: overlays/team/skills/engineering/VCS-pr-review/SKILL.md
    assertions:
      - type: body_contains
        pattern: em.dash

  - name: VCS api preferred over gh cli
    skill: overlays/team/skills/engineering/VCS-pr-review/SKILL.md
    assertions:
      - type: body_contains
        pattern: VCS
      - type: body_absent
        pattern: gh pr (?:create|view)

  - name: frontmatter complete
    skill: overlays/team/skills/engineering/VCS-pr-review/SKILL.md
    assertions:
      - type: frontmatter_has
        key: name
        value: VCS-pr-review
      - type: frontmatter_has
        key: owner
      - type: frontmatter_has
        key: last_reviewed
