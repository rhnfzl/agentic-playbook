# otelcol-contrib pipeline for the playbook.
# Accepts OTLP traces from Claude Code (and any other gen_ai.*-emitting
# adapter), strips prompt/response bodies, and writes JSONL to
# /var/log/playbook/skills.jsonl on the container (bind-mounted to
# ~/.coding-agents-playbook/telemetry/ on the host).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # Privacy guard: strip any attribute whose key starts with one of
  # the body prefixes. Patterns mirror Python's `str.startswith` on
  # BANNED_PREFIXES (see scripts/telemetry/_otlp_record.py) so both
  # collector paths enforce the same contract. The test
  # `test_banned_prefixes_python_match_yaml_patterns` asserts the
  # two surfaces stay in lockstep on every change.
  attributes/strip_bodies:
    actions:
      - pattern: ^gen_ai\.prompt
        action: delete
      - pattern: ^gen_ai\.choice
        action: delete
      - pattern: ^gen_ai\.input\.message
        action: delete
      - pattern: ^gen_ai\.output\.message
        action: delete
      - pattern: ^gen_ai\.completion
        action: delete
  batch:
    timeout: 5s

exporters:
  file:
    path: /var/log/playbook/skills.jsonl
    format: json
    rotation:
      max_megabytes: 50
      max_backups: 5

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [attributes/strip_bodies, batch]
      exporters: [file]
