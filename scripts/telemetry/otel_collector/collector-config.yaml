# otelcol-contrib pipeline for the playbook.
# Accepts OTLP traces from Claude Code (and any other gen_ai.*-emitting
# adapter), strips prompt/response bodies, and writes JSONL to
# /var/log/playbook/skills.jsonl on the container (bind-mounted to
# ~/.coding-agents-playbook/telemetry/ on the host).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # Privacy guard: strip any attribute that could carry prompt or
  # response bodies before the exporter sees the span.
  attributes/strip_bodies:
    actions:
      - key: gen_ai.prompt
        action: delete
      - key: gen_ai.choice
        action: delete
      - key: gen_ai.input.messages
        action: delete
      - key: gen_ai.output.messages
        action: delete
      - key: gen_ai.completion
        action: delete
  batch:
    timeout: 5s

exporters:
  file:
    path: /var/log/playbook/skills.jsonl
    format: json
    rotation:
      max_megabytes: 50
      max_backups: 5

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [attributes/strip_bodies, batch]
      exporters: [file]
